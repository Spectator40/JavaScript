<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JavaScript Day 2函数练习</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1>Day 2: 函数练习</h1>
            <p>F12控制台</p>

            <div class="button-group">
                <button id="greetBtn">问候</button>
                <button id="addBtn">加法</button>
                <button id="subtractBtn">减法</button>
                <button id="multiplyBtn">乘法</button>
                <button id="divideBtn">除法</button>
                <button id="squareBtn">计算平方</button>
            </div>

            <div id="output" class="output">
                点击按钮，结果将显示在这里。
            </div>

        </div>

        <script src="script.js"></script>
    </body>
    
</html>
