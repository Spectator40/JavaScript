<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1  JS入门</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Day 1: JavaScript入门</h1>
        <p id="message">按F12打开开发者工具，查看控制台输出。</p>
        <p id="X">宇宙的终极答案</p>

    </div>

    <script src="script.js"></script>
</body>
