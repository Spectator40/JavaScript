<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Map & Filter</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>Map & Filter</h1>
            <p>在 JavaScript 中，<code>map</code> 和 <code>filter</code> 是数组方法，用于处理数组中的元素。</p>

            <div class="button-group">
                <button id="pushBtn">添加元素</button>
                <button id="popBtn">删除末尾</button>
                <button id="mapBtn">转换数组（Map）</button>
                <button id="filterBtn">筛选数组</button>
            </div>

            <div id="output" class="output">
                <strong>当前数组：</strong>
                <span id="arrayDisplay">[]</span>
            </div>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>
